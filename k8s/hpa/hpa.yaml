# HPA baseline — used during bootstrap phase and for comparison metrics.
# The RL autoscaler DISABLES this HPA once it takes over (ONLINE_TRAINING state).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workload-app-hpa
  namespace: rl-autoscaler
  labels:
    app: workload-app
    role: baseline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workload-app
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
