apiVersion: v1
kind: Service
metadata:
  name: workload-app
  namespace: rl-autoscaler
  labels:
    app: workload-app
spec:
  selector:
    app: workload-app
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
# NodePort for local access during development
apiVersion: v1
kind: Service
metadata:
  name: workload-app-external
  namespace: rl-autoscaler
spec:
  selector:
    app: workload-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
  type: NodePort
