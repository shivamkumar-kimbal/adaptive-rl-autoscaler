apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-app
  namespace: rl-autoscaler
  labels:
    app: workload-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workload-app
  template:
    metadata:
      labels:
        app: workload-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: workload-app
          image: workload-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
