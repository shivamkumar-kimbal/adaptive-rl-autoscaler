---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rl-autoscaler-sa
  namespace: rl-autoscaler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rl-autoscaler-role
rules:
  # Read deployments and pods
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Scale deployments (patch scale subresource)
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  # Read pods (for replica counting)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read HPA objects (for baseline comparison)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Read nodes (for cluster capacity awareness)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rl-autoscaler-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rl-autoscaler-role
subjects:
  - kind: ServiceAccount
    name: rl-autoscaler-sa
    namespace: rl-autoscaler
