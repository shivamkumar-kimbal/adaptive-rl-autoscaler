apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-autoscaler
  namespace: rl-autoscaler
  labels:
    app: rl-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rl-autoscaler
  template:
    metadata:
      labels:
        app: rl-autoscaler
    spec:
      serviceAccountName: rl-autoscaler-sa
      containers:
        - name: rl-autoscaler
          image: rl-autoscaler:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: K8S_CONFIG_MODE
              value: "incluster"
            - name: K8S_NAMESPACE
              value: "rl-autoscaler"
            - name: K8S_DEPLOYMENT_NAME
              value: "workload-app"
            - name: PROMETHEUS_URL
              value: "http://prometheus-service.rl-autoscaler.svc.cluster.local:9090"
            - name: SLO_LATENCY_MS
              value: "500"
            - name: ALPHA
              value: "0.7"
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "10"
            - name: MIN_BOOTSTRAP_STEPS
              value: "1000"
            - name: CONTROL_INTERVAL_SECONDS
              value: "30"
            - name: LOG_DIR
              value: "/data/logs"
            - name: MODEL_DIR
              value: "/data/models"
          volumeMounts:
            - name: rl-data
              mountPath: /data
      volumes:
        - name: rl-data
          emptyDir: {}
